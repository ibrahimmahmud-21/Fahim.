<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>ঈদ মোবারক</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background: radial-gradient(circle at top,#0a1a2f,#02050a);
    overflow:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Stars */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* Shapes */
.shape{
    position:absolute;
    border-radius:50%;
    background:rgba(255,215,0,0.2);
    box-shadow:0 0 20px gold;
    animation:float 6s infinite linear;
}
@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-800px);}
}

/* Fireworks */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.card{
    position:relative;
    z-index:2;
    width:95%;        
    max-width:500px;  
    padding:35px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    text-align:center;
    box-shadow:0 0 30px rgba(255,215,0,0.3);
}

/* Pages */
.page{display:none;}
.active{display:block;animation:fade 1s;}
@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Text */
.title{
    font-size:26px;
    background: linear-gradient(90deg,gold,#ffd700,#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.arabic{
    font-size:24px;
    margin-top:10px;
    direction:rtl;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,gold,#ffcc00);
    color:black;
    font-weight:bold;
    cursor:pointer;
}
button:hover{transform:scale(1.05);}

/* Glow */
.glow{
    font-size:24px;
    animation:glow 1s infinite alternate;
}
@keyframes glow{
    from{ text-shadow:0 0 10px gold; }
    to{ text-shadow:0 0 25px yellow; }
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- Music -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2023/03/21/audio_4c0c1c2e7d.mp3">
</audio>

<div class="card">

<!-- Page 1 -->
<div id="p1" class="page active">
    <h1 class="title">🕌 আসসালামু আলাইকুম 🕌</h1>
    <p>তোমার নাম লিখো</p>
    <input id="name" placeholder="নাম লিখো">
    <button onclick="next()">এবং এখানে ক্লিক করো </button>
</div>

<!-- Page 2 -->
<div id="p2" class="page">
    <h2 class="glow">🌙 পবিত্র ঈদুল ফিতরের শুভেচ্ছা</h2>
    <div class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنكُمْ</div>
    <p id="msg"></p>
    <button onclick="next2()">এখানে ক্লিক করো</button>
</div>

<!-- Page 3 -->
<div id="p3" class="page">
    <h1 class="glow">✨ ঈদ মোবারক ✨</h1>
    <p id="finalMsg"></p>
</div>

</div>

<script>

/* Music start after first click */
window.addEventListener("click",()=>{
    document.getElementById("music").play();
},{once:true});

/* Stars */
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    document.body.appendChild(s);
}

/* Shapes */
for(let i=0;i<20;i++){
    let sh=document.createElement("div");
    sh.className="shape";
    sh.style.width=20+Math.random()*50+"px";
    sh.style.height=sh.style.width;
    sh.style.left=Math.random()*100+"%";
    sh.style.top=Math.random()*100+"%";
    document.body.appendChild(sh);
}

let nameVal="";

function next(){
    nameVal=document.getElementById("name").value;

    if(nameVal===""){
        alert("নাম লিখো!");
        return;
    }

    msg.innerText=nameVal+" তোমাকে ঈদের শুভেচ্ছা 🌙";

    p1.classList.remove("active");
    p2.classList.add("active");
}

function next2(){
    p2.classList.remove("active");
    p3.classList.add("active");

    finalMsg.innerText=nameVal+" 🩷তোমার ঈদ আনন্দময় হোক 💚";
}

/* Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function fire(){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height/2;

    for(let i=0;i<60;i++){
        particles.push({
            x:x,y:y,
            dx:(Math.random()-0.5)*6,
            dy:(Math.random()-0.5)*6,
            life:100
        });
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;

        ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

setInterval(fire,800);
animate();

</script>

</body>
</html>
